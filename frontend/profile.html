<script>
const USER_API = window.APP_CONFIG.USER_URL;
const token = localStorage.getItem('jwt_token');

// ถ้าไม่มี token ให้เด้งกลับหน้าแรก
if (!token) {
    window.location.href = 'index.html';
}

async function loadProfile() {
    try {
        const res = await fetch(`${USER_API}/api/users/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        console.log("Data loaded:", data); // ดูข้อมูลที่โหลดได้ใน F12

        if (res.ok) {
            // ดึงข้อมูลจาก data.user ตามโครงสร้างของ Backend
            const u = data.user; 
            if (u) {
                document.getElementById('display_name').value = u.name || '';
                document.getElementById('bio').value = u.bio || '';
                
                const displayName = u.name || 'User Profile';
                document.getElementById('header-name').textContent = displayName;
                document.getElementById('avatar-initial').textContent = displayName.charAt(0).toUpperCase();
            }
        }
    } catch (err) {
        console.error("Load Profile Error:", err);
    }
}

async function updateProfile() {
    const nameValue = document.getElementById('display_name').value;
    const bioValue = document.getElementById('bio').value;

    try {
        // ลองใช้ PATCH หาก PUT ไม่ทำงาน (บาง Backend ของ Lab นี้ใช้ PATCH ในการอัปเดตบางส่วน)
        const res = await fetch(`${USER_API}/api/users/me`, {
            method: 'PATCH', 
            headers: { 
                'Authorization': `Bearer ${token}`, 
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({ 
                name: nameValue, 
                bio: bioValue 
            }) 
        });

        const result = await res.json();
        console.log("Update result:", result);

        if (res.ok) {
            showToast('บันทึกข้อมูลสำเร็จแล้ว!');
            loadProfile(); // โหลดใหม่เพื่อยืนยันว่าข้อมูลใน DB เปลี่ยนแล้วจริง
        } else {
            // ถ้า PATCH ไม่ได้ ให้ลองเปลี่ยนกลับเป็น PUT
            if (res.status === 405) {
                console.log("PATCH not allowed, trying PUT...");
                retryUpdateWithPut(nameValue, bioValue);
            } else {
                alert('บันทึกไม่สำเร็จ: ' + (result.message || 'ตรวจสอบการเชื่อมต่อ'));
            }
        }
    } catch (err) {
        console.error("Update Error:", err);
        alert('เกิดข้อผิดพลาดในการเชื่อมต่อกับ Railway');
    }
}

// ฟังก์ชันสำรองกรณี Backend บังคับใช้ PUT
async function retryUpdateWithPut(name, bio) {
    const res = await fetch(`${USER_API}/api/users/me`, {
        method: 'PUT',
        headers: { 
            'Authorization': `Bearer ${token}`, 
            'Content-Type': 'application/json' 
        },
        body: JSON.stringify({ name, bio })
    });
    if (res.ok) {
        showToast('บันทึกข้อมูลสำเร็จแล้ว (PUT)!');
        loadProfile();
    } else {
        alert('บันทึกไม่ได้ ทั้ง PUT และ PATCH');
    }
}

function showToast(msg) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = '✅ ' + msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

loadProfile();
</script>
