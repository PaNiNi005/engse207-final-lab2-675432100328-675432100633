<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👤 Profile — Final Lab Set 2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #273448;
      --border: #334155; --text: #e2e8f0; --muted: #94a3b8;
      --blue: #3b82f6; --blue2: #2563eb; --purple: #a855f7; --radius: 10px;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
    #app-page { display: flex; height: 100vh; }
    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-logo { padding: 1.25rem 1.5rem; font-size: 1.1rem; font-weight: 700; border-bottom: 1px solid var(--border); }
    .sidebar-nav { flex: 1; padding: .75rem; }
    .nav-item { display: flex; align-items: center; gap: .75rem; padding: .65rem 1rem; border-radius: 8px; color: var(--muted); font-size: .9rem; text-decoration: none; margin-bottom: 2px; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(59,130,246,.15); color: var(--blue); }
    .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .page-header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); background: var(--surface); }
    .page-body { padding: 2rem; flex: 1; display: flex; justify-content: center; }
    .profile-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 600px; height: fit-content; }
    .profile-header { display: flex; align-items: center; gap: 1.25rem; margin-bottom: 2rem; }
    .profile-avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 700; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; color: var(--muted); font-size: .85rem; margin-bottom: .4rem; }
    .form-group input, .form-group textarea { width: 100%; padding: .75rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; }
    .btn-submit { width: 100%; padding: .85rem; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; }
    .toast { padding: .75rem 1.25rem; border-radius: 10px; font-size: .88rem; background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.3); animation: fadeIn .2s ease; margin-top: 10px; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  </style>
</head>
<body>

<div id="app-page">
  <nav class="sidebar">
    <div class="sidebar-logo">📋 Task Board</div>
    <div class="sidebar-nav">
      <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span> หน้าหลัก</a>
      <a href="profile.html" class="nav-item active"><span class="nav-icon">👤</span> โปรไฟล์</a>
    </div>
  </nav>

  <div class="main-content">
    <div class="page-header"><h1 style="font-size: 1.3rem;">👤 แก้ไขข้อมูลส่วนตัว</h1></div>
    <div class="page-body">
      <div class="profile-card">
        <div class="profile-header">
          <div class="profile-avatar" id="avatar-initial">?</div>
          <div>
            <h2 id="header-name">กำลังโหลด...</h2>
            <p style="color: var(--muted); font-size: 0.9rem;">จัดการข้อมูลส่วนตัวของคุณ</p>
          </div>
        </div>
        <div class="form-group">
          <label>ชื่อที่แสดง (Name)</label>
          <input type="text" id="display_name" placeholder="ระบุชื่อของคุณ">
        </div>
        <div class="form-group">
          <label>คำอธิบายตัวเอง (Bio)</label>
          <textarea id="bio" placeholder="บอกเล่าเรื่องราวของคุณสักนิด..."></textarea>
        </div>
        <button class="btn-submit" id="save-btn" onclick="updateProfile()">💾 บันทึกการเปลี่ยนแปลง</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="config.js"></script>
<script>
  const USER_API = window.APP_CONFIG.USER_URL; // ตอนนี้จะเป็น .../api แล้ว
  const token = localStorage.getItem('jwt_token');

  if (!token) window.location.href = 'index.html';

  async function loadProfile() {
    try {
      // เรียกไปที่ .../api/users/me
      const res = await fetch(`${USER_API}/users/me`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      
      if (res.ok && data.user) {
        console.log("🔍 ข้อมูลปัจจุบัน:", data);
        const p = data.user.profile || {};
        document.getElementById('display_name').value = p.display_name || '';
        document.getElementById('bio').value = p.bio || '';
        
        const headerName = p.display_name || data.user.username || 'User';
        document.getElementById('header-name').textContent = headerName;
        document.getElementById('avatar-initial').textContent = headerName.charAt(0).toUpperCase();
      }
    } catch (err) { console.error("Load Error:", err); }
  }

async function updateProfile() {
  const saveBtn = document.getElementById('save-btn');
  const nameVal = document.getElementById('display_name').value;
  const bioVal = document.getElementById('bio').value;

  saveBtn.disabled = true;
  saveBtn.textContent = '⏳ กำลังบันทึก...';

  // 🛠️ ปรับตรงนี้: ส่งเป็น Object แบนๆ ตามที่ Backend แกะค่า { display_name, bio }
  const payload = {
    display_name: nameVal,
    bio: bioVal,
    avatar_url: "" 
  };

  try {
    const res = await fetch(`${USER_API}/users/me`, {
      method: 'PUT',
      headers: { 
        'Authorization': `Bearer ${token}`, 
        'Content-Type': 'application/json' 
      },
      body: JSON.stringify(payload)
    });

    const result = await res.json();
    console.log("✅ ผลลัพธ์หลังกดบันทึก:", result);

    if (res.ok) {
      showToast('บันทึกสำเร็จ!');
      loadProfile(); 
    } else {
      alert('บันทึกไม่สำเร็จ: ' + (result.error || 'Server Error'));
    }
  } catch (err) {
    alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '💾 บันทึกการเปลี่ยนแปลง';
  }
}

  function showToast(msg) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = '✅ ' + msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  loadProfile();
</script>
</body>
</html>
