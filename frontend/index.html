<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="engse207-frontend-health" content="frontend-ok">
  <title>🔐  Task Board — Final Lab Set 2</title>
  <style>
    /* ... (CSS ทั้งหมดรักษาไว้ตามต้นฉบับ) ... */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --surface2: #273448;
      --border:   #334155;
      --text:     #e2e8f0;
      --muted:    #94a3b8;
      --blue:     #3b82f6;
      --blue2:    #2563eb;
      --green:    #22c55e;
      --yellow:   #f59e0b;
      --red:      #ef4444;
      --purple:   #a855f7;
      --radius:   10px;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; line-height: 1.5;
    }
    button { cursor: pointer; font-family: inherit; transition: all .15s; }
    input, select, textarea { font-family: inherit; }
    .hidden { display: none !important; }
    #auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
    .auth-box { background: var(--surface); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,.5); }
    .auth-logo { font-size: 2.5rem; text-align: center; margin-bottom: .5rem; }
    .auth-title { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: .25rem; }
    .auth-subtitle { text-align: center; color: var(--muted); font-size: .9rem; margin-bottom: 1.5rem; }
    .auth-tabs { display: flex; background: var(--bg); border-radius: 8px; padding: 4px; margin-bottom: 1.5rem; gap: 4px; }
    .auth-tab { flex: 1; padding: .6rem; border: none; border-radius: 6px; background: transparent; color: var(--muted); font-size: .9rem; font-weight: 500; }
    .auth-tab.active { background: var(--blue); color: white; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; color: var(--muted); font-size: .85rem; margin-bottom: .4rem; font-weight: 500; }
    .form-group input { width: 100%; padding: .75rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; transition: border-color .2s; }
    .form-group input:focus { outline: none; border-color: var(--blue); }
    .btn-primary { width: 100%; padding: .85rem; background: var(--blue); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; margin-top: .5rem; }
    .btn-primary:hover { background: var(--blue2); transform: translateY(-1px); }
    .auth-hint { background: var(--bg); border-radius: 8px; padding: 1rem; margin-top: 1.2rem; font-size: .8rem; color: var(--muted); border: 1px solid var(--border); }
    .auth-hint strong { color: var(--text); }
    .auth-msg { padding: .7rem 1rem; border-radius: 8px; margin-top: 1rem; font-size: .9rem; text-align: center; }
    .auth-msg.error { background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
    .auth-msg.success { background: rgba(34,197,94,.15); color: #86efac; border: 1px solid rgba(34,197,94,.3); }
    #app-page { display: flex; height: 100vh; }
    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { padding: 1.25rem 1.5rem; font-size: 1.1rem; font-weight: 700; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .6rem; }
    .sidebar-nav { flex: 1; padding: .75rem; }
    .nav-item { display: flex; align-items: center; gap: .75rem; padding: .65rem 1rem; border-radius: 8px; cursor: pointer; color: var(--muted); font-size: .9rem; font-weight: 500; border: none; background: none; width: 100%; text-align: left; transition: all .15s; margin-bottom: 2px; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(59,130,246,.15); color: var(--blue); }
    .nav-item .nav-icon { font-size: 1.1rem; width: 20px; text-align: center; }
    .nav-item .badge-count { margin-left: auto; background: var(--blue); color: white; font-size: .7rem; padding: 2px 7px; border-radius: 999px; font-weight: 700; }
    .sidebar-footer { padding: 1rem; border-top: 1px solid var(--border); }
    .user-chip { display: flex; align-items: center; gap: .75rem; padding: .65rem .75rem; background: var(--bg); border-radius: 8px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .9rem; flex-shrink: 0; }
    .user-info-small { flex: 1; min-width: 0; }
    .user-info-small .name { font-size: .85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-info-small .role-badge { font-size: .7rem; color: white; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
    .role-admin { background: var(--purple); }
    .role-member { background: var(--blue); }
    .role-viewer { background: var(--muted); }
    .btn-logout { background: none; border: none; color: var(--muted); padding: 4px; font-size: .9rem; border-radius: 6px; }
    .btn-logout:hover { color: var(--red); background: rgba(239,68,68,.1); }
    .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .page-header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
    .page-title { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: .5rem; }
    .page-body { padding: 2rem; flex: 1; }
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1rem; }
    .stat-icon { font-size: 1.6rem; }
    .stat-value { font-size: 1.6rem; font-weight: 700; }
    .stat-label { font-size: .78rem; color: var(--muted); }
    .toolbar { display: flex; align-items: center; gap: .75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .filter-btn { padding: .5rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: .85rem; font-weight: 500; }
    .filter-btn.active { border-color: var(--blue); background: rgba(59,130,246,.15); color: var(--blue); }
    .filter-btn:hover { border-color: var(--blue); color: var(--blue); }
    .spacer { flex: 1; }
    .btn-add { padding: .55rem 1.2rem; background: var(--blue); color: white; border: none; border-radius: 8px; font-size: .9rem; font-weight: 600; display: flex; align-items: center; gap: .4rem; }
    .btn-add:hover { background: var(--blue2); transform: translateY(-1px); }
    .task-list { display: flex; flex-direction: column; gap: .75rem; }
    .task-card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; transition: border-color .2s, transform .15s; }
    .task-card:hover { transform: translateX(2px); }
    .task-card.status-TODO { border-left-color: #64748b; }
    .task-card.status-IN_PROGRESS{ border-left-color: var(--yellow); }
    .task-card.status-DONE { border-left-color: var(--green); }
    .task-header { display: flex; align-items: flex-start; gap: .75rem; }
    .task-header .title { flex: 1; font-weight: 600; font-size: .95rem; }
    .task-header .title.done { text-decoration: line-through; color: var(--muted); }
    .task-meta { display: flex; align-items: center; gap: .5rem; margin-top: .5rem; flex-wrap: wrap; }
    .chip { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 5px; font-size: .72rem; font-weight: 600; }
    .chip-todo { background: rgba(100,116,139,.2); color: #94a3b8; }
    .chip-inprogress { background: rgba(245,158,11,.2); color: #fbbf24; }
    .chip-done { background: rgba(34,197,94,.2); color: #4ade80; }
    .chip-low { background: rgba(100,116,139,.15); color: #94a3b8; }
    .chip-medium { background: rgba(59,130,246,.15); color: #7dd3fc; }
    .chip-high { background: rgba(239,68,68,.2); color: #fca5a5; }
    .chip-owner { background: rgba(168,85,247,.15); color: #c4b5fd; }
    .task-actions { display: flex; gap: .4rem; margin-left: auto; }
    .btn-icon { padding: .3rem .5rem; border-radius: 6px; border: none; background: transparent; color: var(--muted); font-size: .85rem; }
    .btn-icon:hover { background: var(--surface2); }
    .btn-icon.edit:hover { color: var(--blue); }
    .btn-icon.delete:hover { color: var(--red); background: rgba(239,68,68,.1); }
    .task-desc { font-size: .82rem; color: var(--muted); margin-top: .4rem; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); font-size: 1rem; }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 1rem; }
    .status-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 2px 6px; font-size: .78rem; cursor: pointer; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 500px; box-shadow: 0 25px 50px rgba(0,0,0,.6); max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
    .modal-header h3 { font-size: 1.1rem; font-weight: 700; }
    .btn-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; padding: .2rem .4rem; border-radius: 6px; }
    .btn-close:hover { background: var(--surface2); color: var(--text); }
    .modal-body { padding: 1.5rem; }
    .modal-body .form-group { margin-bottom: 1.1rem; }
    .modal-body input, .modal-body select, .modal-body textarea { width: 100%; padding: .7rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .9rem; }
    .modal-body textarea { min-height: 80px; resize: vertical; }
    .modal-body select option { background: var(--surface); }
    .modal-footer { display: flex; gap: .75rem; justify-content: flex-end; padding: 1rem 1.5rem; border-top: 1px solid var(--border); }
    .btn-secondary { padding: .6rem 1.2rem; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-size: .9rem; }
    .btn-danger { padding: .6rem 1.2rem; background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); border-radius: 8px; font-size: .9rem; }
    .btn-submit { padding: .6rem 1.4rem; background: var(--blue); color: white; border: none; border-radius: 8px; font-size: .9rem; font-weight: 600; }
    .btn-submit:hover { background: var(--blue2); }
    .user-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .user-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; padding: .9rem 1.25rem; border-bottom: 1px solid var(--border); align-items: center; font-size: .88rem; }
    .user-row.header { background: var(--surface2); color: var(--muted); font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .user-row:last-child { border-bottom: none; }
    .user-row:not(.header):hover { background: var(--surface2); }
    .user-email { color: var(--muted); font-size: .82rem; }
    .profile-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; max-width: 600px; }
    .profile-header { display: flex; align-items: center; gap: 1.25rem; margin-bottom: 1.5rem; }
    .profile-avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 700; }
    .profile-info h2 { font-size: 1.25rem; }
    .profile-info p { color: var(--muted); font-size: .9rem; margin-top: 2px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .info-item label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: .2rem; text-transform: uppercase; letter-spacing: .06em; }
    .info-item p { font-size: .95rem; font-weight: 500; }
    .jwt-panel { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-top: 1.5rem; }
    .jwt-panel h3 { font-size: .9rem; color: var(--muted); margin-bottom: 1rem; display: flex; align-items: center; gap: .4rem; }
    .jwt-parts { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .jwt-part { padding: 4px 8px; border-radius: 5px; font-family: monospace; font-size: .7rem; word-break: break-all; }
    .jwt-header-part { background: rgba(239,68,68,.2); color: #fca5a5; }
    .jwt-payload-part { background: rgba(168,85,247,.2); color: #c4b5fd; }
    .jwt-sig-part { background: rgba(59,130,246,.2); color: #93c5fd; }
    .jwt-decoded { font-size: .8rem; }
    .jwt-decoded pre { background: var(--surface); padding: .75rem 1rem; border-radius: 8px; overflow-x: auto; color: var(--text); border: 1px solid var(--border); }
    .token-exp { margin-top: .75rem; font-size: .82rem; }
    .exp-ok { color: var(--green); }
    .exp-bad { color: var(--red); }
    .logs-link { display: inline-flex; align-items: center; gap: .4rem; margin-top: 1rem; padding: .5rem 1rem; background: rgba(168,85,247,.15); color: #c4b5fd; border: 1px solid rgba(168,85,247,.3); border-radius: 8px; font-size: .85rem; text-decoration: none; font-weight: 500; }
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: .5rem; }
    .toast { padding: .75rem 1.25rem; border-radius: 10px; font-size: .88rem; font-weight: 500; animation: fadeIn .2s ease; box-shadow: 0 8px 25px rgba(0,0,0,.3); max-width: 320px; }
    .toast.success { background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
    .toast.error { background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
    .toast.info { background: rgba(59,130,246,.15); color: #93c5fd; border: 1px solid rgba(59,130,246,.3); }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .confirm-msg { text-align: center; padding: .5rem 0; }
    .confirm-msg .warn-icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .confirm-msg p { color: var(--muted); font-size: .9rem; margin-top: .4rem; }
  </style>
</head>
<body>

<div id="auth-page">
  <div class="auth-box">
    <div class="auth-logo">🔐</div>
    <div class="auth-title">Task Board</div>
    <div class="auth-subtitle">Task Board — Final Lab Set 2</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label>Email</label><input id="login-email" type="email" value="alice@example.com"></div>
      <div class="form-group"><label>Password</label><input id="login-password" type="password" value="password123"></div>
      <button class="btn-primary" onclick="doLogin()">เข้าสู่ระบบ</button>
    </div>
    <div id="register-form" class="hidden">
      <div class="form-group"><label>ชื่อ</label><input id="reg-name" type="text" placeholder="ชื่อ-นามสกุล"></div>
      <div class="form-group"><label>Email</label><input id="reg-email" type="email"></div>
      <div class="form-group"><label>Password</label><input id="reg-password" type="password"></div>
      <button class="btn-primary" onclick="doRegister()">สมัครสมาชิก</button>
    </div>
    <div id="auth-msg"></div>
  </div>
</div>

<div id="app-page" class="hidden">
  <nav class="sidebar">
    <div class="sidebar-logo">📋 Task Board</div>
<div class="sidebar-nav">
      <button class="nav-item active" data-page="tasks" onclick="showPage('tasks')"><span class="nav-icon">✅</span> Tasks <span class="badge-count" id="task-count">0</span></button>
      <button class="nav-item" data-page="users" id="nav-users" onclick="showPage('users')"><span class="nav-icon">👥</span> Users <span class="badge-count" id="user-count" style="display:none">0</span></button>
      <a href="profile.html" class="nav-item" style="text-decoration: none;">
        <span class="nav-icon">👤</span> Profile & Settings
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div class="user-info-small"><div class="name" id="sidebar-name">—</div><span class="role-badge" id="sidebar-role-badge">—</span></div>
        <button class="btn-logout" onclick="doLogout()">✕</button>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <div id="page-tasks">
      <div class="page-header"><div class="page-title">✅ Tasks</div><button class="btn-add" onclick="openCreateModal()">＋ สร้าง Task ใหม่</button></div>
      <div class="page-body">
        <div class="stats-grid">
            <div class="stat-card"><div><div class="stat-value" id="st-total">—</div><div class="stat-label">ทั้งหมด</div></div></div>
            <div class="stat-card"><div><div class="stat-value" id="st-todo">—</div><div class="stat-label">TODO</div></div></div>
            <div class="stat-card"><div><div class="stat-value" id="st-inprog">—</div><div class="stat-label">In Progress</div></div></div>
            <div class="stat-card"><div><div class="stat-value" id="st-done">—</div><div class="stat-label">Done</div></div></div>
        </div>
        <div class="toolbar">
          <button class="filter-btn active" onclick="setFilter('ALL')">ทั้งหมด</button>
          <button class="filter-btn" onclick="setFilter('TODO')">TODO</button>
          <button class="filter-btn" onclick="setFilter('IN_PROGRESS')">In Progress</button>
          <button class="filter-btn" onclick="setFilter('DONE')">Done</button>
        </div>
        <div class="task-list" id="task-list"></div>
      </div>
    </div>

    <div id="page-users" class="hidden">
      <div class="page-header"><div class="page-title">👥 Users</div></div>
      <div class="page-body">
        <div id="users-admin-only" class="hidden"><div class="user-table"><div class="user-row header"><div>ผู้ใช้</div><div>Email</div><div>Role</div><div>สมัครเมื่อ</div></div><div id="user-rows"></div></div></div>
        <div id="users-forbidden" class="empty-state hidden"><div class="emoji">🚫</div><p>403 Forbidden</p></div>
      </div>
    </div>

    <div id="page-profile" class="hidden">
      <div class="page-header"><div class="page-title">👤 Profile & JWT</div></div>
      <div class="page-body">
        <div class="profile-card">
            <div class="profile-header"><div class="profile-avatar" id="prof-avatar">?</div><div class="profile-info"><h2 id="prof-name">—</h2><p id="prof-email">—</p></div></div>
            <div class="jwt-panel"><h3>🔍 JWT Inspector</h3><div id="jwt-parts"></div><div id="jwt-decoded"></div><div id="token-exp"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="task-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header"><h3 id="modal-title">จัดการ Task</h3><button class="btn-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="modal-task-id">
      <div class="form-group"><label>ชื่อ Task *</label><input id="modal-task-title"></div>
      <div class="form-group"><label>รายละเอียด</label><textarea id="modal-task-desc"></textarea></div>
      <div class="form-group"><label>สถานะ</label><select id="modal-task-status"><option value="TODO">TODO</option><option value="IN_PROGRESS">In Progress</option><option value="DONE">Done</option></select></div>
      <div class="form-group"><label>ความสำคัญ</label><select id="modal-task-priority"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div>
    </div>
    <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">ยกเลิก</button><button class="btn-submit" id="modal-submit-btn" onclick="submitTask()">💾 บันทึก</button></div>
  </div>
</div>

<div id="confirm-modal" class="modal-overlay hidden">
  <div class="modal"><div class="modal-body"><div class="confirm-msg"><p>ลบ Task นี้?</p></div></div><div class="modal-footer"><button class="btn-secondary" onclick="closeConfirm()">ยกเลิก</button><button class="btn-danger" id="confirm-delete-btn">ลบ</button></div></div>
</div>
<div class="toast-container" id="toast-container"></div>

<script src="config.js"></script>

<script>
/* ─────────────────────────────────────
   STATE & CONFIG (ดึงจาก window.APP_CONFIG)
───────────────────────────────────── */
const AUTH = window.APP_CONFIG.AUTH_URL;
const TASK = window.APP_CONFIG.TASK_URL;
const USER = window.APP_CONFIG.USER_URL;

let currentUser = null;
let token       = localStorage.getItem('jwt_token');
let allTasks    = [];
let currentFilter = 'ALL';

/* ─────────────────────────────────────
   API HELPERS
───────────────────────────────────── */
function authHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`
  };
}

/* ─────────────────────────────────────
   AUTH (ใช้ AUTH URL)
───────────────────────────────────── */
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  
  try {
    const res = await fetch(`${AUTH}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (res.ok) {
      token = data.token;
      localStorage.setItem('jwt_token', token);
      initApp(data.user);
    } else {
      toast(data.error || 'Login ล้มเหลว', 'error');
    }
  } catch(err) { toast('เชื่อมต่อ Server Auth ไม่ได้', 'error'); }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;

  try {
    const res = await fetch(`${AUTH}/api/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password }) // หรือใช้ username ตาม spec API ของคุณ
    });
    const data = await res.json();

    if (res.ok) {
      token = data.token;
      localStorage.setItem('jwt_token', token);
      initApp(data.user);
    } else {
      toast(data.error || 'สมัครไม่สำเร็จ', 'error');
    }
  } catch(err) { toast('เชื่อมต่อ Server Auth ไม่ได้', 'error'); }
}

/* ─────────────────────────────────────
   TASKS (ใช้ TASK URL)
───────────────────────────────────── */
async function loadTasks() {
  try {
    const res = await fetch(`${TASK}/api/tasks/`, { headers: authHeaders() });
    const data = await res.json();
    if (res.ok) {
      allTasks = data.tasks || [];
      renderTasks();
      updateStats();
      document.getElementById('task-count').textContent = allTasks.length;
    }
  } catch(err) { console.error("Task API Error", err); }
}

async function submitTask() {
  const id = document.getElementById('modal-task-id').value;
  const body = {
    title: document.getElementById('modal-task-title').value,
    description: document.getElementById('modal-task-desc').value,
    status: document.getElementById('modal-task-status').value,
    priority: document.getElementById('modal-task-priority').value,
  };

  const method = id ? 'PUT' : 'POST';
  const url = id ? `${TASK}/api/tasks/${id}` : `${TASK}/api/tasks/`;

  try {
    const res = await fetch(url, {
      method: method,
      headers: authHeaders(),
      body: JSON.stringify(body)
    });
    if (res.ok) {
      toast('สำเร็จ', 'success');
      closeModal();
      loadTasks();
    }
  } catch(err) { toast('บันทึก Task ไม่สำเร็จ', 'error'); }
}

async function quickStatusUpdate(id, newStatus) {
  try {
    await fetch(`${TASK}/api/tasks/${id}`, {
      method: 'PUT',
      headers: authHeaders(),
      body: JSON.stringify({ status: newStatus })
    });
    loadTasks();
  } catch(err) { toast('Update สถานะไม่สำเร็จ', 'error'); }
}

async function deleteTask(id) {
  try {
    const res = await fetch(`${TASK}/api/tasks/${id}`, {
      method: 'DELETE',
      headers: authHeaders()
    });
    if (res.ok) {
      toast('ลบ Task แล้ว', 'success');
      closeConfirm();
      loadTasks();
    }
  } catch(err) { toast('ลบไม่สำเร็จ', 'error'); }
}

/* ─────────────────────────────────────
   USERS & PROFILE (ใช้ USER URL)
───────────────────────────────────── */
async function loadUsers() {
  try {
    const res = await fetch(`${USER}/api/users/`, { headers: authHeaders() });
    const data = await res.json();
    const adminDiv = document.getElementById('users-admin-only');
    const forbiddenDiv = document.getElementById('users-forbidden');

    if (res.status === 403) {
      adminDiv.classList.add('hidden');
      forbiddenDiv.classList.remove('hidden');
      return;
    }

    if (res.ok) {
      forbiddenDiv.classList.add('hidden');
      adminDiv.classList.remove('hidden');
      document.getElementById('user-rows').innerHTML = data.users.map(u => `
        <div class="user-row">
          <div><strong>${u.name}</strong></div>
          <div>${u.email}</div>
          <div><span class="role-badge role-${u.role}">${u.role}</span></div>
          <div>${new Date(u.created_at).toLocaleDateString()}</div>
        </div>
      `).join('');
    }
  } catch(err) { console.error("User API Error", err); }
}

async function loadProfile() {
  try {
    const res = await fetch(`${USER}/api/users/me`, { headers: authHeaders() });
    const data = await res.json();
    if (res.ok) {
      const u = data.user;
      document.getElementById('prof-name').textContent = u.name;
      document.getElementById('prof-email').textContent = u.email;
      document.getElementById('prof-avatar').textContent = (u.name||'?')[0];
      renderJwtInspector();
    }
  } catch(err) { console.error("Profile API Error", err); }
}

/* ─────────────────────────────────────
   UI & NAVIGATION (รักษา Logic เดิม)
───────────────────────────────────── */
function initApp(user) {
  currentUser = user;
  document.getElementById('auth-page').classList.add('hidden');
  document.getElementById('app-page').classList.remove('hidden');
  document.getElementById('sidebar-name').textContent = user.name || user.email;
  document.getElementById('sidebar-avatar').textContent = (user.name||'?')[0];
  document.getElementById('sidebar-role-badge').textContent = user.role;
  document.getElementById('sidebar-role-badge').className = `role-badge role-${user.role}`;
  document.getElementById('nav-users').style.display = user.role === 'admin' ? 'flex' : 'none';
  showPage('tasks');
}

function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
  ['tasks','users','profile'].forEach(p => {
    document.getElementById(`page-${p}`).classList.toggle('hidden', p !== page);
  });
  if (page === 'tasks') loadTasks();
  if (page === 'users') loadUsers();
  if (page === 'profile') loadProfile();
}

function switchTab(tab) {
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.querySelectorAll('.auth-tab').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(tab)));
}

function renderTasks() {
  const filtered = currentFilter === 'ALL' ? allTasks : allTasks.filter(t => t.status === currentFilter);
  const list = document.getElementById('task-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">📝</div><p>ไม่มีรายการ</p></div>';
    return;
  }
  list.innerHTML = filtered.map(t => `
    <div class="task-card status-${t.status}">
      <div class="task-header">
        <div class="title ${t.status === 'DONE' ? 'done' : ''}">${t.title}</div>
        <div class="task-actions">
          <button class="btn-icon edit" onclick="openEditModal(${t.id})">✏️</button>
          <button class="btn-icon delete" onclick="openConfirm(${t.id})">🗑️</button>
        </div>
      </div>
      <div class="task-desc">${t.description || ''}</div>
      <div class="task-meta">
        <span class="chip chip-owner">👤 ${t.owner_id || 'system'}</span>
        <span class="chip chip-${t.priority}">Priority: ${t.priority}</span>
        <select class="status-select" onchange="quickStatusUpdate(${t.id}, this.value)">
          <option value="TODO" ${t.status==='TODO'?'selected':''}>TODO</option>
          <option value="IN_PROGRESS" ${t.status==='IN_PROGRESS'?'selected':''}>In Progress</option>
          <option value="DONE" ${t.status==='DONE'?'selected':''}>Done</option>
        </select>
      </div>
    </div>
  `).join('');
}

function updateStats() {
  const c = { TODO:0, IN_PROGRESS:0, DONE:0 };
  allTasks.forEach(t => c[t.status]++);
  document.getElementById('st-total').textContent = allTasks.length;
  document.getElementById('st-todo').textContent = c.TODO;
  document.getElementById('st-inprog').textContent = c.IN_PROGRESS;
  document.getElementById('st-done').textContent = c.DONE;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.onclick.toString().includes(f));
  });
  renderTasks();
}

function openCreateModal() {
  document.getElementById('modal-title').textContent = 'สร้าง Task ใหม่';
  document.getElementById('modal-task-id').value = '';
  document.getElementById('modal-task-title').value = '';
  document.getElementById('modal-task-desc').value = '';
  document.getElementById('modal-task-status').value = 'TODO';
  document.getElementById('modal-task-priority').value = 'low';
  document.getElementById('task-modal').classList.remove('hidden');
}

function openEditModal(id) {
  const t = allTasks.find(x => x.id === id);
  if (!t) return;
  document.getElementById('modal-title').textContent = 'แก้ไข Task';
  document.getElementById('modal-task-id').value = t.id;
  document.getElementById('modal-task-title').value = t.title;
  document.getElementById('modal-task-desc').value = t.description;
  document.getElementById('modal-task-status').value = t.status;
  document.getElementById('modal-task-priority').value = t.priority;
  document.getElementById('task-modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('task-modal').classList.add('hidden'); }
function openConfirm(id) {
  document.getElementById('confirm-modal').classList.remove('hidden');
  document.getElementById('confirm-delete-btn').onclick = () => deleteTask(id);
}
function closeConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); }

function toast(msg, type) {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toast-container').prepend(t);
  setTimeout(() => t.remove(), 3000);
}

function doLogout() {
  localStorage.removeItem('jwt_token');
  location.reload();
}

function renderJwtInspector() {
  if (!token) return;
  const parts = token.split('.');
  if (parts.length !== 3) return;
  const html = `
    <div class="jwt-parts">
      <span class="jwt-part jwt-header-part">${parts[0]}</span>.
      <span class="jwt-part jwt-payload-part">${parts[1]}</span>.
      <span class="jwt-part jwt-sig-part">${parts[2]}</span>
    </div>
  `;
  document.getElementById('jwt-parts').innerHTML = html;
  try {
    const payload = JSON.parse(atob(parts[1]));
    document.getElementById('jwt-decoded').innerHTML = `<pre>${JSON.stringify(payload, null, 2)}</pre>`;
    const exp = new Date(payload.exp * 1000);
    const isBad = exp < new Date();
    document.getElementById('token-exp').innerHTML = `<div class="token-exp ${isBad?'exp-bad':'exp-ok'}">${isBad?'❌ Expired':'✅ Valid until'}: ${exp.toLocaleString()}</div>`;
  } catch(e) {}
}

// Auto-Login
if (token) {
  fetch(`${AUTH}/api/auth/verify`, { headers: { Authorization: `Bearer ${token}` } })
    .then(r => r.json())
    .then(data => data.valid ? initApp(data.user) : doLogout())
    .catch(() => doLogout());
}
</script>
</body>
</html>
