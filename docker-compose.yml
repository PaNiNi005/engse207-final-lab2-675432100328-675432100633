services:
  # ── Databases ──────────────────────────────────────────────────────
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5433:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  task-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5434:5432"
    volumes:
      - task_data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taskdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5435:5432"
    volumes:
      - user_data:/var/lib/postgresql/data
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Services ───────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    environment:
      DATABASE_URL: postgres://admin:secret123@auth-db:5432/authdb
      JWT_SECRET: ${JWT_SECRET:-dev-shared-secret}
      JWT_EXPIRES: 1h
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      auth-db: { condition: service_healthy }
    restart: unless-stopped

  task-service:
    build: ./task-service
    environment:
      DATABASE_URL: postgres://admin:secret123@task-db:5432/taskdb
      JWT_SECRET: ${JWT_SECRET:-dev-shared-secret}
      PORT: 3002
      NODE_ENV: development
    ports:
      - "3002:3002"
    depends_on:
      task-db: { condition: service_healthy }
    restart: unless-stopped

  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: postgres://admin:secret123@user-db:5432/userdb
      JWT_SECRET: ${JWT_SECRET:-dev-shared-secret}
      PORT: 3003
      NODE_ENV: development
    ports:
      - "3003:3003"
    depends_on:
      user-db: { condition: service_healthy }
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - task-service
      - user-service
    restart: unless-stopped

volumes:
  auth_data:
  task_data:
  user_data:
